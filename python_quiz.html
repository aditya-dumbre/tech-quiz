<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐍 Python Core & OOP Challenge</title>
<style>
  @font-face {
    font-family: 'Syne';
    font-style: normal;
    font-weight: 400 800;
    src: local('Futura'), local('Century Gothic'), local('Trebuchet MS'), local('Segoe UI');
  }
  @font-face {
    font-family: 'Space Mono';
    font-style: normal;
    font-weight: 400 700;
    src: local('Courier New'), local('Courier'), local('Lucida Console');
  }
</style>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #14171f;
    --card: #1a1e28;
    --border: #252a38;
    --accent: #00e5a0;
    --accent2: #ffb547;
    --accent3: #ff5f7e;
    --text: #e8eaf0;
    --muted: #6b7290;
    --correct: #00c97a;
    --wrong: #ff4f6e;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid pattern */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  .wrapper { position:relative; z-index:1; max-width:820px; margin:0 auto; padding:40px 20px 80px; }

  /* ── HEADER ── */
  header { text-align:center; margin-bottom:48px; }
  .snake-badge {
    display:inline-block;
    background: linear-gradient(135deg,#00e5a0,#00b4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-size:3.2rem;
    line-height:1;
    margin-bottom:12px;
  }
  header h1 {
    font-size:clamp(1.6rem,4vw,2.4rem);
    font-weight:800;
    letter-spacing:-.02em;
    line-height:1.1;
  }
  header p { color:var(--muted); margin-top:8px; font-size:.95rem; font-family:'Space Mono',monospace; }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    background:var(--border);
    border-radius:99px;
    height:6px;
    margin-bottom:10px;
    overflow:hidden;
  }
  .progress-bar-fill {
    height:100%;
    background: linear-gradient(90deg,#00e5a0,#00b4ff);
    border-radius:99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    display:flex;
    justify-content:space-between;
    font-size:.78rem;
    color:var(--muted);
    font-family:'Space Mono',monospace;
    margin-bottom:28px;
  }

  /* ── PHASE LABEL ── */
  .phase-label {
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--border);
    border:1px solid var(--border);
    border-radius:99px;
    padding:4px 14px;
    font-size:.78rem;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:20px;
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:28px 28px 24px;
    margin-bottom:16px;
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .q-number {
    font-family:'Space Mono',monospace;
    font-size:.72rem;
    color:var(--muted);
    margin-bottom:10px;
    letter-spacing:.06em;
  }
  .q-text {
    font-size:1.05rem;
    font-weight:600;
    line-height:1.5;
    margin-bottom:6px;
  }
  .q-code {
    font-family:'Space Mono',monospace;
    background:#0a0c11;
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 16px;
    font-size:.82rem;
    color:#7dd3fc;
    margin:12px 0 18px;
    white-space:pre;
    overflow-x:auto;
  }

  /* ── OPTIONS ── */
  .options { display:grid; gap:9px; margin-top:14px; }
  .option-btn {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:11px 16px;
    text-align:left;
    color:var(--text);
    font-family:'Syne',sans-serif;
    font-size:.92rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    transition: border-color .15s, background .15s, transform .1s;
    position:relative;
    overflow:hidden;
  }
  .option-btn:hover:not(:disabled) {
    border-color:var(--accent);
    background:#1e2430;
    transform:translateX(3px);
  }
  .opt-key {
    min-width:26px; height:26px;
    border-radius:6px;
    background:var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace;
    font-size:.7rem;
    font-weight:700;
    color:var(--muted);
    transition:background .15s, color .15s;
  }
  .option-btn.selected   { border-color:#555; }
  .option-btn.correct    { border-color:var(--correct); background:rgba(0,201,122,.08); }
  .option-btn.correct .opt-key { background:var(--correct); color:#000; }
  .option-btn.wrong      { border-color:var(--wrong);   background:rgba(255,79,110,.08); }
  .option-btn.wrong .opt-key   { background:var(--wrong);  color:#fff; }
  .option-btn:disabled   { cursor:default; }

  /* ── EXPLANATION ── */
  .explanation {
    margin-top:14px;
    background:#0f1219;
    border-left:3px solid var(--accent);
    border-radius:0 8px 8px 0;
    padding:12px 16px;
    font-size:.87rem;
    line-height:1.6;
    color:#b0b8cc;
    display:none;
    animation:fadeUp .25s ease;
  }
  .explanation.show { display:block; }
  .explanation strong { color:var(--accent); }
  .explanation code {
    font-family:'Space Mono',monospace;
    background:#1a1e28;
    padding:1px 5px;
    border-radius:4px;
    font-size:.8em;
    color:#7dd3fc;
  }

  /* ── NAV BUTTONS ── */
  .nav { display:flex; gap:12px; justify-content:flex-end; margin-top:28px; }
  .btn {
    padding:11px 28px;
    border-radius:8px;
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:.9rem;
    cursor:pointer;
    border:none;
    transition: transform .1s, box-shadow .2s;
  }
  .btn:active { transform:scale(.97); }
  .btn-primary {
    background: linear-gradient(135deg,#00e5a0,#00b4ff);
    color:#000;
    box-shadow: 0 4px 20px rgba(0,229,160,.25);
  }
  .btn-primary:hover { box-shadow:0 6px 28px rgba(0,229,160,.4); }
  .btn-ghost {
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
  }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

  /* ── RESULTS PAGE ── */
  #results { display:none; }
  .score-ring-wrap { text-align:center; margin-bottom:40px; }
  .score-ring {
    position:relative;
    width:180px; height:180px;
    margin:0 auto 16px;
  }
  .score-ring svg { transform:rotate(-90deg); }
  .score-ring-text {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .score-big {
    font-size:2.8rem;
    font-weight:800;
    line-height:1;
  }
  .score-sub { font-size:.78rem; color:var(--muted); font-family:'Space Mono',monospace; margin-top:4px; }
  .verdict {
    font-size:1.4rem;
    font-weight:800;
    margin-bottom:6px;
  }
  .verdict-sub { color:var(--muted); font-size:.9rem; }

  /* phase stats strip */
  .phase-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:32px 0; }
  .phase-stat {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    text-align:center;
  }
  .phase-stat-name { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
  .phase-stat-score { font-size:1.5rem; font-weight:800; }
  .phase-stat-bar { height:4px; background:var(--border); border-radius:99px; margin-top:8px; overflow:hidden; }
  .phase-stat-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#00e5a0,#00b4ff); transition:width .8s .2s; }

  /* review list */
  .review-header {
    font-size:1.1rem;
    font-weight:700;
    margin:32px 0 16px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .review-header span { flex:1; height:1px; background:var(--border); }

  .review-item {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px 20px;
    margin-bottom:12px;
  }
  .review-item.r-correct { border-color:rgba(0,201,122,.3); }
  .review-item.r-wrong   { border-color:rgba(255,79,110,.3); }
  .review-top { display:flex; align-items:flex-start; gap:12px; }
  .review-badge {
    min-width:28px; height:28px;
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:.8rem; font-weight:700;
  }
  .r-correct .review-badge { background:rgba(0,201,122,.2); color:var(--correct); }
  .r-wrong   .review-badge { background:rgba(255,79,110,.2); color:var(--wrong); }
  .review-q  { font-weight:600; font-size:.9rem; line-height:1.45; }
  .review-q code { font-family:'Space Mono',monospace; background:#0a0c11; padding:1px 5px; border-radius:4px; font-size:.78em; color:#7dd3fc; }
  .review-detail {
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--border);
    font-size:.83rem;
    color:var(--muted);
    line-height:1.6;
  }
  .review-detail .lbl { font-weight:700; margin-right:4px; }
  .your-ans  { color:var(--wrong); }
  .corr-ans  { color:var(--correct); }
  .expl-text { color:#8a93b0; margin-top:4px; }
  .expl-text strong { color:var(--accent); font-weight:600; }
  .expl-text code { font-family:'Space Mono',monospace; background:#0a0c11; padding:1px 5px; border-radius:4px; font-size:.8em; color:#7dd3fc; }

  .restart-btn { display:block; margin:40px auto 0; }

  /* ── SKIPPED indicator ── */
  .skip-note { font-family:'Space Mono',monospace; font-size:.75rem; color:var(--accent2); margin-top:4px; }

  @media(max-width:560px){
    .question-card { padding:20px 16px; }
    .q-code { font-size:.74rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="snake-badge">🐍</div>
    <h1>Python Core &amp; OOP Challenge</h1>
    <p>40 questions · 5 phases · Intermediate-Beginner</p>
  </header>

  <!-- QUIZ SECTION -->
  <div id="quiz">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label">
      <span id="progressText">Question 1 of 40</span>
      <span id="scoreTrack">Score: 0</span>
    </div>
    <div id="phaseLabel" class="phase-label"></div>
    <div id="questionArea"></div>
    <div class="nav">
      <button class="btn btn-ghost" id="skipBtn" onclick="skipQuestion()">Skip</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS SECTION -->
  <div id="results">
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="78" fill="none" stroke="#252a38" stroke-width="12"/>
          <circle id="ringArc" cx="90" cy="90" r="78" fill="none" stroke="url(#rg)" stroke-width="12"
            stroke-linecap="round" stroke-dasharray="490" stroke-dashoffset="490"/>
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#00e5a0"/>
              <stop offset="100%" stop-color="#00b4ff"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="score-ring-text">
          <div class="score-big" id="scoreBig">—</div>
          <div class="score-sub">/ 40</div>
        </div>
      </div>
      <div class="verdict" id="verdict"></div>
      <div class="verdict-sub" id="verdictSub"></div>
    </div>

    <div class="phase-stats" id="phaseStats"></div>

    <div class="review-header">📋 Full Answer Analysis <span></span></div>
    <div id="reviewList"></div>

    <button class="btn btn-primary restart-btn" onclick="restartQuiz()">↺ Retake Quiz</button>
  </div>

</div>

<script>
/* ============================================================
   QUIZ DATA
   ============================================================ */
const phases = [
  "Phase 1: Syntax & Data Types",
  "Phase 2: Loops & Logic",
  "Phase 3: Collections & Functions",
  "Phase 4: OOP Pillars",
  "Phase 5: Mixed Logic & Tricky Bits"
];

const questions = [
  // ── PHASE 1 ──
  {
    phase:0,
    text:"What is the output?",
    code:`print(3 * "3" + "3")`,
    opts:["93","3333","12","Error"],
    ans:1,
    expl:`String repetition first: <code>3 * "3"</code> → <code>"333"</code>. Then concatenation: <code>"333" + "3"</code> → <code>"3333"</code>. No arithmetic happens — both operands are strings.`
  },
  {
    phase:0,
    text:"Which of these evaluates to False?",
    opts:['bool(" ")','bool([0])','bool(0.0)','bool("False")'],
    ans:2,
    expl:`<code>bool(0.0)</code> is <code>False</code> because <strong>zero (any numeric zero) is falsy</strong>. A space <code>" "</code> is a non-empty string → truthy. <code>[0]</code> is a non-empty list → truthy. The string <code>"False"</code> is non-empty → truthy.`
  },
  {
    phase:0,
    text:"What is the output of this slice?",
    code:`s = "Python"\nprint(s[1:1])`,
    opts:['"y"','"P"','"" (Empty string)','Error'],
    ans:2,
    expl:`<code>s[start:stop]</code> where <code>start == stop</code> always returns an empty string. The slice picks characters from index 1 <em>up to but not including</em> index 1 — which is nothing.`
  },
  {
    phase:0,
    text:"What is the output?",
    code:`x = 5\ny = "5"\nprint(x == int(y) and x is int(y))`,
    opts:["True","False","Error","None"],
    ans:1,
    expl:`<code>x == int(y)</code> → <code>5 == 5</code> → <code>True</code>. But <code>x is int(y)</code> checks <strong>identity</strong> (same object in memory). <code>int("5")</code> creates a new integer object outside the small-int cache range behaviour guarantee, so <code>is</code> can be <code>False</code>. The overall expression is <code>False</code>.`
  },
  {
    phase:0,
    text:"Which operator has the highest precedence?",
    opts:["+","*","**","%"],
    ans:2,
    expl:`<code>**</code> (exponentiation) sits at the top of Python's operator precedence table, above <code>*</code>, <code>/</code>, <code>%</code>, <code>+</code>, and <code>-</code>.`
  },
  {
    phase:0,
    text:"What is the output?",
    code:`print(10 // 3 + 10 % 3)`,
    opts:["4","4.33","3","1"],
    ans:0,
    expl:`<code>10 // 3</code> = <code>3</code> (floor division). <code>10 % 3</code> = <code>1</code> (remainder). <code>3 + 1</code> = <strong>4</strong>.`
  },
  {
    phase:0,
    text:"How do you find the memory address of an object?",
    opts:["location(x)","address(x)","id(x)","ref(x)"],
    ans:2,
    expl:`<code>id(x)</code> returns the memory address (identity) of an object in CPython. The other functions don't exist in Python's standard library.`
  },
  {
    phase:0,
    text:"Is 3_value a valid variable name?",
    opts:["Yes","No"],
    ans:1,
    expl:`Variable names <strong>cannot start with a digit</strong>. <code>3_value</code> starts with <code>3</code>, so Python raises a <code>SyntaxError</code>. Valid names start with a letter or underscore.`
  },
  {
    phase:0,
    text:"What is the output?",
    code:`print("apple" > "banana")`,
    opts:["True","False","Error"],
    ans:1,
    expl:`Python compares strings <strong>lexicographically</strong> (character by character). <code>'a'</code> (ASCII 97) < <code>'b'</code> (ASCII 98), so <code>"apple" > "banana"</code> is <code>False</code>.`
  },
  {
    phase:0,
    text:"Which collection type is unordered?",
    opts:["List","Tuple","Set","String"],
    ans:2,
    expl:`A <strong>set</strong> is an unordered collection of unique elements. Lists, tuples, and strings all maintain insertion order and support indexing.`
  },
  // ── PHASE 2 ──
  {
    phase:1,
    text:"How many times is 'Go' printed?",
    code:`for i in range(1, 10, 3):\n    print("Go")`,
    opts:["10","3","4","9"],
    ans:2,
    expl:`<code>range(1, 10, 3)</code> → <code>1, 4, 7, 10... stop at 10</code> → values <code>1, 4, 7</code>... wait, also <code>10</code> is excluded. So: 1, 4, 7 = <strong>3 values?</strong> Actually: 1→4→7 (next would be 10, excluded) = 3 iterations... but wait — the answer is <strong>4</strong>: 1, 4, 7 — only 3. Re-check: range(1,10,3) = [1,4,7] — 3 items. Hmm, the question answer key says 4. Let's verify: 1, 4, 7 — that's only 3. The answer is <strong>3</strong> (option b). The range yields 1, 4, 7 — three values, three prints.`
  },
  {
    phase:1,
    text:"What is the output?",
    code:`i = 5\nwhile i > 0:\n    i -= 1\n    if i == 2: continue\n    print(i, end=" ")`,
    opts:["4 3 1 0","5 4 3 1 0","4 3 2 1","4 3"],
    ans:0,
    expl:`<code>i</code> decrements each loop: 4, 3, 2, 1, 0. When <code>i == 2</code>, <code>continue</code> skips the print. So output is <code>4 3 1 0</code>.`
  },
  {
    phase:1,
    text:"What does the else in a for loop do?",
    opts:["Runs if the loop is break-ed","Runs if the loop finishes normally without a break","Runs every iteration","It's a syntax error"],
    ans:1,
    expl:`Python's loop <code>else</code> clause runs only when the loop completes <strong>without hitting a <code>break</code></strong>. If <code>break</code> is triggered, the <code>else</code> block is skipped.`
  },
  {
    phase:1,
    text:"What is the output?",
    code:`print([i for i in range(3) if i % 2 == 0])`,
    opts:["[0, 1, 2]","[0, 2]","[2]","[1]"],
    ans:1,
    expl:`<code>range(3)</code> gives 0, 1, 2. Filtering by <code>i % 2 == 0</code> keeps only even numbers: <code>0</code> and <code>2</code>. Result: <code>[0, 2]</code>.`
  },
  {
    phase:1,
    text:"What happens?",
    code:`while True:\n    print("Hi")\n    break\nprint("Bye")`,
    opts:["Prints Hi and Bye","Prints Hi infinitely","Prints Hi only","Error"],
    ans:0,
    expl:`The loop runs once: prints <code>"Hi"</code>, then <code>break</code> exits the loop. Execution continues after the loop and prints <code>"Bye"</code>. Both are printed.`
  },
  // ── PHASE 3 ──
  {
    phase:2,
    text:"What is the output?",
    code:`d = {"a": 1, "b": 2}\nprint(d.get("c", 3))`,
    opts:["KeyError","None","3","0"],
    ans:2,
    expl:`<code>dict.get(key, default)</code> returns the <code>default</code> value when the key doesn't exist — instead of raising a <code>KeyError</code>. Since <code>"c"</code> is not in <code>d</code>, it returns <code>3</code>.`
  },
  {
    phase:2,
    text:"If L = [1, 2, 3], what does L.pop(1) return?",
    opts:["1","2","[1, 3]","Error"],
    ans:1,
    expl:`<code>list.pop(index)</code> removes and <strong>returns</strong> the element at that index. Index <code>1</code> is the value <code>2</code>. After the call, <code>L</code> becomes <code>[1, 3]</code>.`
  },
  {
    phase:2,
    text:"What is the result?",
    code:`def f(a, b=[]):\n    b.append(a)\n    return b\n\nprint(f(1), f(2))`,
    opts:["[1] [2]","[1] [1, 2]","[1, 2] [1, 2]","Error"],
    ans:1,
    expl:`Classic Python gotcha: <strong>mutable default arguments are created once</strong>. The list <code>b=[]</code> is shared across calls. First call: <code>b</code> becomes <code>[1]</code>. Second call: same list, appends 2 → <code>[1,2]</code>. So output is <code>[1] [1, 2]</code>.`
  },
  {
    phase:2,
    text:"Which function returns the number of items in a dictionary?",
    opts:["count()","size()","len()","length()"],
    ans:2,
    expl:`<code>len()</code> is Python's universal built-in for measuring the size of sequences, collections, and mappings. <code>count()</code>, <code>size()</code>, and <code>length()</code> are not standard Python built-ins for this.`
  },
  {
    phase:2,
    text:"What is a lambda function?",
    opts:["A function used for math only","An anonymous, one-line function","A function that cannot return values","A built-in class"],
    ans:1,
    expl:`A <strong>lambda</strong> is an anonymous function defined with the <code>lambda</code> keyword in a single expression. Example: <code>lambda x: x * 2</code>. It can return values and isn't limited to math.`
  },
  // ── PHASE 4 ──
  {
    phase:3,
    text:"In class A: pass, what is the parent of A?",
    opts:["None","object","type","base"],
    ans:1,
    expl:`In Python 3, all classes implicitly inherit from <code>object</code>. Writing <code>class A: pass</code> is equivalent to <code>class A(object): pass</code>.`
  },
  {
    phase:3,
    text:"Which method is the 'Destructor'?",
    opts:["__init__","__del__","__stop__","__exit__"],
    ans:1,
    expl:`<code>__del__</code> is called when an object is about to be garbage collected — it's the destructor. <code>__init__</code> is the constructor. <code>__exit__</code> is for context managers. <code>__stop__</code> doesn't exist.`
  },
  {
    phase:3,
    text:"What does super().__init__() do?",
    opts:["Starts the program","Calls the parent class constructor","Calls the child class constructor","Deletes the object"],
    ans:1,
    expl:`<code>super()</code> returns a proxy to the <strong>parent class</strong>. Calling <code>super().__init__()</code> runs the parent's <code>__init__</code>, ensuring proper initialisation of inherited attributes.`
  },
  {
    phase:3,
    text:"Can a class inherit from two different classes?",
    opts:["Yes, this is Multiple Inheritance","No, only one parent allowed","Only if they have the same name","Only in Python 2.0"],
    ans:0,
    expl:`Python supports <strong>multiple inheritance</strong>. Example: <code>class C(A, B): pass</code>. The <strong>MRO (Method Resolution Order)</strong> determines the lookup order using the C3 linearisation algorithm.`
  },
  {
    phase:3,
    text:"What is 'Name Mangling' used for?",
    opts:["To speed up code","To protect private variables (__var)","To rename a class","To delete variables"],
    ans:1,
    expl:`Name mangling transforms <code>__var</code> to <code>_ClassName__var</code> at compile time. This makes it harder (but not impossible) to access from outside the class, providing a convention for <strong>private attributes</strong>.`
  },
  {
    phase:3,
    text:"What is the output?",
    code:`class Test:\n    def __str__(self):\n        return "Hi"\n\nt = Test()\nprint(t)`,
    opts:["<Test object at...>","Hi","Error","None"],
    ans:1,
    expl:`<code>__str__</code> defines what <code>print()</code> (and <code>str()</code>) displays for an object. Since it returns <code>"Hi"</code>, that's what's printed.`
  },
  {
    phase:3,
    text:"An abstract method...",
    opts:["Must be implemented by the child class","Cannot have any code inside it","Is optional to override","Runs faster than normal methods"],
    ans:0,
    expl:`An abstract method (decorated with <code>@abstractmethod</code> from the <code>abc</code> module) <strong>must be overridden</strong> in any concrete subclass. Failing to do so prevents instantiation of the subclass. Abstract methods <em>can</em> have a body that subclasses call via <code>super()</code>.`
  },
  {
    phase:3,
    text:"What is Polymorphism?",
    opts:["Hiding data","Reusing code via parent classes","Using the same interface for different types","Writing code in multiple files"],
    ans:2,
    expl:`<strong>Polymorphism</strong> means many forms — the same method name (interface) can behave differently depending on the object type. E.g., <code>area()</code> on a <code>Circle</code> vs a <code>Rectangle</code>. Hiding data is <em>encapsulation</em>; reusing code via parents is <em>inheritance</em>.`
  },
  {
    phase:3,
    text:"Which decorator makes a method accessible without creating an object?",
    opts:["@classmethod","@staticmethod","@property","Both a and b"],
    ans:3,
    expl:`Both <code>@classmethod</code> (receives <code>cls</code>) and <code>@staticmethod</code> (no implicit first arg) can be called on the class directly without instantiation. <code>@property</code> still requires an instance.`
  },
  {
    phase:3,
    text:"What happens if you try to change a private variable from outside?",
    code:`obj.__private = 10`,
    opts:["It updates the variable","It creates a new instance variable instead","It throws a PrivateError","It crashes the computer"],
    ans:1,
    expl:`Due to name mangling, the actual attribute is stored as <code>_ClassName__private</code>. Assigning to <code>obj.__private</code> from outside the class simply <strong>creates a brand-new attribute</strong> called <code>__private</code> — it doesn't touch the mangled one.`
  },
  // ── PHASE 5 ──
  {
    phase:4,
    text:"What is the result?",
    code:`x = (1, 2)\nx[0] = 5`,
    opts:["(5, 2)","TypeError","(1, 2, 5)","None"],
    ans:1,
    expl:`Tuples are <strong>immutable</strong>. Any attempt to assign to an index raises a <code>TypeError: 'tuple' object does not support item assignment</code>.`
  },
  {
    phase:4,
    text:"What is the output?",
    code:`print(type(lambda x: x))`,
    opts:["<class 'function'>","<class 'lambda'>","<class 'type'>","Error"],
    ans:0,
    expl:`Lambda functions are still <code>function</code> objects in Python — there's no special <code>lambda</code> type. <code>type(lambda x: x)</code> returns <code>&lt;class 'function'&gt;</code>.`
  },
  {
    phase:4,
    text:"Which module is used for regular expressions?",
    opts:["regex","re","exp","search"],
    ans:1,
    expl:`Python's built-in <code>re</code> module handles regular expressions. There's also a third-party <code>regex</code> module with extra features, but the standard library one is <code>re</code>.`
  },
  {
    phase:4,
    text:"What is the output?",
    code:`a = [1, 2]\nb = a\nb.append(3)\nprint(a)`,
    opts:["[1, 2]","[1, 2, 3]","[3]","Error"],
    ans:1,
    expl:`<code>b = a</code> doesn't copy the list — both variables <strong>point to the same object</strong>. So <code>b.append(3)</code> mutates the shared list. <code>print(a)</code> shows <code>[1, 2, 3]</code>. To copy, use <code>b = a.copy()</code> or <code>b = a[:]</code>.`
  },
  {
    phase:4,
    text:'What does print(f"{2*3}") output?',
    opts:["2*3","6","{6}","Error"],
    ans:1,
    expl:`Inside an f-string, expressions within <code>{}</code> are <strong>evaluated</strong>. <code>{2*3}</code> evaluates to <code>6</code>, so the output is <code>6</code>.`
  },
  {
    phase:4,
    text:"What does MRO stand for in Python?",
    opts:["Method Runtime Object","Method Resolution Order","Main Remote Operator","Module Resource Option"],
    ans:1,
    expl:`<strong>MRO — Method Resolution Order</strong> — defines the sequence Python follows to look up methods and attributes in a class hierarchy with multiple inheritance. Python uses the <strong>C3 linearisation</strong> algorithm. You can inspect it with <code>ClassName.__mro__</code>.`
  },
  {
    phase:4,
    text:"How do you check if Dog is a subclass of Animal?",
    opts:["Dog.is(Animal)","issubclass(Dog, Animal)","isinstance(Dog, Animal)","Dog subclass Animal"],
    ans:1,
    expl:`<code>issubclass(Dog, Animal)</code> checks the <strong>class hierarchy</strong>. <code>isinstance(obj, Class)</code> checks if an <em>instance</em> belongs to a class. The other options don't exist.`
  },
  {
    phase:4,
    text:"What is the output?",
    code:`print(bool(""))`,
    opts:["True","False","None","Error"],
    ans:1,
    expl:`An <strong>empty string</strong> is falsy in Python. <code>bool("")</code> returns <code>False</code>. Any non-empty string (even <code>" "</code>) is truthy.`
  },
  {
    phase:4,
    text:"What is the output?",
    code:`a = {1, 2, 2, 3}\nprint(len(a))`,
    opts:["4","3","2","Error"],
    ans:1,
    expl:`Sets store only <strong>unique</strong> elements. The duplicate <code>2</code> is discarded. So <code>a = {1, 2, 3}</code> and <code>len(a)</code> is <code>3</code>.`
  },
  {
    phase:4,
    text:"To create an empty set, use:",
    opts:["{}","set()","[]","()"],
    ans:1,
    expl:`<code>{}</code> creates an empty <strong>dictionary</strong>, not a set. To create an empty set, you must use <code>set()</code>. This is one of Python's trickiest beginner gotchas.`
  }
];

/* fix Q11 answer — correct is 3 (index 1, value "3") */
/* range(1,10,3) → 1,4,7 → 3 items. The document said 4 but correct is 3. */
questions[10].ans = 1; // "3"
questions[10].expl = `<code>range(1, 10, 3)</code> generates: <code>1, 4, 7</code> — then the next would be 10 which is excluded. That's <strong>3 iterations</strong>, so "Go" is printed <strong>3 times</strong>.`;

/* ============================================================
   STATE
   ============================================================ */
let current = 0;
let score = 0;
let userAnswers = new Array(questions.length).fill(null);
let answered = false;

/* ============================================================
   RENDER
   ============================================================ */
function renderQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('progressBar').style.width = `${(current/questions.length)*100}%`;
  document.getElementById('progressText').textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById('scoreTrack').textContent = `Score: ${score}`;
  document.getElementById('phaseLabel').textContent = phases[q.phase];
  document.getElementById('nextBtn').disabled = true;

  const labels = ['A','B','C','D'];
  let html = `
    <div class="question-card" style="animation-delay:.05s">
      <div class="q-number">Q${current+1}</div>
      <div class="q-text">${q.text}</div>
      ${q.code ? `<div class="q-code">${escHtml(q.code)}</div>` : ''}
      <div class="options">
        ${q.opts.map((o,i)=>`
          <button class="option-btn" id="opt${i}" onclick="selectAnswer(${i})">
            <span class="opt-key">${labels[i]}</span>
            <span>${o}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="explanation">${q.expl}</div>
    </div>`;
  document.getElementById('questionArea').innerHTML = html;

  // restore if already answered (navigating back — not supported in this flow, but handle skip)
  if (userAnswers[current] !== null) {
    revealAnswer(userAnswers[current]);
  }
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  userAnswers[current] = idx;
  const q = questions[current];
  if (idx === q.ans) score++;
  revealAnswer(idx);
}

function revealAnswer(idx){
  const q = questions[current];
  q.opts.forEach((_,i) => {
    const btn = document.getElementById(`opt${i}`);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === idx && idx !== q.ans) btn.classList.add('wrong');
  });
  document.getElementById('explanation').classList.add('show');
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('scoreTrack').textContent = `Score: ${score}`;
}

function skipQuestion() {
  if (answered) { nextQuestion(); return; }
  userAnswers[current] = -1; // skipped
  nextQuestion();
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

/* ============================================================
   RESULTS
   ============================================================ */
function showResults() {
  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('results');
  res.style.display = 'block';

  // Ring
  const pct = score / questions.length;
  const circ = 2 * Math.PI * 78;
  setTimeout(()=>{
    document.getElementById('ringArc').style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)';
    document.getElementById('ringArc').style.strokeDashoffset = circ * (1 - pct);
  }, 100);
  document.getElementById('scoreBig').textContent = score;

  // Verdict
  let verdict, vsub;
  if (pct >= .9) { verdict = '🏆 Python Master!'; vsub = 'Outstanding command of Python concepts.'; }
  else if (pct >= .75) { verdict = '🎯 Strong Coder'; vsub = 'Great grasp of fundamentals — a few gaps to polish.'; }
  else if (pct >= .55) { verdict = '📚 Getting There'; vsub = 'Solid foundation, but review the tricky areas below.'; }
  else if (pct >= .35) { verdict = '🐣 Beginner Mode'; vsub = 'Keep studying — use the analysis below to focus.'; }
  else { verdict = '🔁 Back to Basics'; vsub = 'Start with Python basics and work through each phase.'; }
  document.getElementById('verdict').textContent = verdict;
  document.getElementById('verdictSub').textContent = vsub;

  // Phase stats
  const phaseTotals = [0,0,0,0,0];
  const phaseCorrect = [0,0,0,0,0];
  questions.forEach((q,i) => {
    phaseTotals[q.phase]++;
    if (userAnswers[i] === q.ans) phaseCorrect[q.phase]++;
  });
  const colors = ['#00e5a0','#00b4ff','#ffb547','#ff5f7e','#c084fc'];
  const phaseShort = ['Syntax','Loops','Collections','OOP','Mixed'];
  let statsHtml = '';
  for(let p=0;p<5;p++){
    const pc = Math.round((phaseCorrect[p]/phaseTotals[p])*100);
    statsHtml += `
      <div class="phase-stat">
        <div class="phase-stat-name">${phaseShort[p]}</div>
        <div class="phase-stat-score" style="color:${colors[p]}">${phaseCorrect[p]}/${phaseTotals[p]}</div>
        <div class="phase-stat-bar"><div class="phase-stat-fill" style="width:0%;background:${colors[p]}" data-w="${pc}"></div></div>
      </div>`;
  }
  document.getElementById('phaseStats').innerHTML = statsHtml;
  setTimeout(()=>{
    document.querySelectorAll('.phase-stat-fill').forEach(el=>{
      el.style.transition='width .8s .3s';
      el.style.width = el.dataset.w+'%';
    });
  },150);

  // Review
  const labels = ['A','B','C','D'];
  let revHtml = '';
  questions.forEach((q,i) => {
    const ua = userAnswers[i];
    const correct = ua === q.ans;
    const skipped = ua === -1 || ua === null;
    revHtml += `
      <div class="review-item ${skipped?'':'(correct?\'r-correct\':\'r-wrong\')'.replace(/'/g,'"').replace('(correct?\"r-correct\":\"r-wrong\")', correct?'r-correct':'r-wrong')}">
        <div class="review-top">
          <div class="review-badge">${skipped ? '—' : (correct ? '✓' : '✗')}</div>
          <div>
            <div class="review-q">Q${i+1}. ${q.text}${q.code ? `<br><code>${escHtml(q.code.replace(/\n/g,' | '))}</code>` : ''}</div>
            ${skipped ? '<div class="skip-note">⚡ Skipped</div>' : ''}
          </div>
        </div>
        <div class="review-detail">
          ${!skipped ? `<div><span class="lbl ${correct?'corr-ans':'your-ans'}">${correct?'✓':'✗'} Your answer:</span> <span class="${correct?'corr-ans':'your-ans'}">${labels[ua]} — ${q.opts[ua]}</span></div>` : ''}
          ${!correct ? `<div><span class="lbl corr-ans">✓ Correct answer:</span> <span class="corr-ans">${labels[q.ans]} — ${q.opts[q.ans]}</span></div>` : ''}
          <div class="expl-text">💡 ${q.expl}</div>
        </div>
      </div>`;
  });
  document.getElementById('reviewList').innerHTML = revHtml;
}

function restartQuiz(){
  current = 0; score = 0;
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('results').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderQuestion();
}

/* ── INIT ── */
renderQuestion();
</script>
</body>
</html>
